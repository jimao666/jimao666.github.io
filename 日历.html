        const weekDaysEn = ['SUNDAY', 'MONDAY', 'TUESDAY', 'WEDNESDAY', 'THURSDAY', 'FRIDAY', 'SATURDAY'];
        const monthsEn = ['JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE', 
                         'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER'];
        const solarTerms = ['立春', '雨水', '惊蛰', '春分', '清明', '谷雨', '立夏', '小满', '芒种', '夏至', 
                           '小暑', '大暑', '立秋', '处暑', '白露', '秋分', '寒露', '霜降', '立冬', '小雪', 
                           '大雪', '冬至', '小寒', '大寒'];
        
        let currentDate = new Date(2026, 1, 5); // Default to the date in image
        let selectedYear = currentDate.getFullYear();
        let selectedMonth = currentDate.getMonth();
        let selectedDay = currentDate.getDate();

        // Simplified lunar calculation (for demo purposes)
        function getLunarDate(date) {
            const baseDate = new Date(2026, 1, 5); // Known lunar date: 腊月十八
            const baseLunarMonth = 11; // 腊月 is index 11
            const baseLunarDay = 17; // 十八 is index 17
            
            const diffDays = Math.floor((date - baseDate) / (1000 * 60 * 60 * 24));
            
            let lunarMonth = baseLunarMonth;
            let lunarDay = baseLunarDay + diffDays;
            
            // Simplified month rollover (assuming 30 days per month for demo)
            while (lunarDay >= 30) {
                lunarDay -= 30;
                lunarMonth = (lunarMonth + 1) % 12;
            }
            while (lunarDay < 0) {
                lunarDay += 30;
                lunarMonth = (lunarMonth - 1 + 12) % 12;
            }
            
            return {
                month: lunarMonths[lunarMonth],
                day: lunarDays[lunarDay],
                monthIndex: lunarMonth,
                dayIndex: lunarDay
            };
        }

        function getGanZhi(date) {
            const year = date.getFullYear();
            const month = date.getMonth();
            const day = date.getDate();
            
            // Simplified GanZhi calculation
            const stemIndex = (year + month + day) % 10;
            const branchIndex = (year + month + day) % 12;
            
            return {
                gan: heavenlyStems[stemIndex],
                zhi: earthlyBranches[branchIndex],
                animal: animals[branchIndex]
            };
        }

        function getSolarTerm(date) {
            const month = date.getMonth();
            const day = date.getDate();
            
            // Approximate solar terms (simplified)
            if (day === 3 || day === 4) return solarTerms[month * 2];
            if (day === 18 || day === 19) return solarTerms[month * 2 + 1];
            return '';
        }

        function getNinePeriod(date) {
            const start = new Date(date.getFullYear(), 0, 1);
            const diff = Math.floor((date - start) / (1000 * 60 * 60 * 24));
            const nineIndex = Math.floor(diff / 9) + 1;
            const dayInNine = (diff % 9) + 1;
            
            if (nineIndex <= 9) return `九九第${dayInNine}天`;
            return '';
        }

        function getYiJi(date) {
            const day = date.getDate();
            const activities = [
                '安门', '求学', '嫁娶', '祈福', '祭祀', '搬家', '开业', '签约',
                '出行', '会友', '动土', '装修', '纳财', '安床', '裁衣'
            ];
            
            // Pseudo-random based on date
            const seed = day * 7 % activities.length;
            const yi = activities.slice(seed, seed + 4);
            const ji = activities.slice((seed + 5) % activities.length, (seed + 8) % activities.length);
            
            return {
                yi: yi.join(' '),
                ji: ji.join(' ')
            };
        }

        function getDirections(date) {
            const directions = ['东', '南', '西', '北', '东南', '西南', '东北', '西北'];
            const seed = date.getDate() % directions.length;
            return {
                xi: directions[seed],
                gui: directions[(seed + 2) % directions.length],
                cai: directions[(seed + 4) % directions.length]
            };
        }

        function getTimeSlots(date) {
            const times = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
            const seed = date.getDate() % 12;
            return times.map((time, i) => ({
                name: time,
                lucky: (i + seed) % 3 !== 0
            }));
        }

        function updateCalendar() {
            const page = document.getElementById('calendarPage');
            
            // Update basic info
            document.getElementById('monthEn').textContent = monthsEn[currentDate.getMonth()];
            document.getElementById('yearDisplay').textContent = currentDate.getFullYear();
            document.getElementById('monthCn').textContent = (currentDate.getMonth() + 1) + '月';
            document.getElementById('bigDate').textContent = currentDate.getDate();
            document.getElementById('weekDay').textContent = weekDays[currentDate.getDay()];
            document.getElementById('weekDayEn').textContent = weekDaysEn[currentDate.getDay()];
            
            // Lunar info
            const lunar = getLunarDate(currentDate);
            document.getElementById('lunarMonth').textContent = lunar.month;
            document.getElementById('lunarDate').textContent = lunar.day;
            document.getElementById('fullLunar').textContent = `乙巳年${lunar.month}小`;
            
            // Solar term
            const term = getSolarTerm(currentDate);
            document.getElementById('solarTerm').textContent = term ? lunar.day + term : lunar.day;
            
            // Nine periods
            const nine = getNinePeriod(currentDate);
            document.getElementById('ninePeriod').textContent = nine;
            
            // Yi/Ji
            const yiji = getYiJi(currentDate);
            document.getElementById('yiContent').innerHTML = yiji.yi.replace(/ /g, '<br>');
            document.getElementById('jiContent').innerHTML = yiji.ji.replace(/ /g, '<br>');
            
            // GanZhi
            const gz = getGanZhi(currentDate);
            document.getElementById('gan').textContent = gz.gan;
            document.getElementById('zhi').textContent = gz.zhi;
            
            // Directions
            const dir = getDirections(currentDate);
            document.getElementById('xiShen').textContent = dir.xi;
            document.getElementById('guiShen').textContent = dir.gui;
            document.getElementById('caiShen').textContent = dir.cai;
            
            // Time slots
            const slots = getTimeSlots(currentDate);
            const slotsHtml = slots.map(slot => 
                `<div class="time-slot ${slot.lucky ? 'lucky' : ''}">${slot.name}</div>`
            ).join('');
            document.getElementById('timeSlots').innerHTML = slotsHtml;
        }

        function changeDate(days) {
            const page = document.getElementById('calendarPage');
            
            // Add flip animation
            page.classList.add(days > 0 ? 'flipping-next' : 'flipping-prev');
            
            setTimeout(() => {
                currentDate.setDate(currentDate.getDate() + days);
                updateCalendar();
            }, 400);
            
            setTimeout(() => {
                page.classList.remove('flipping-next', 'flipping-prev');
            }, 800);
        }

        function goToToday() {
            currentDate = new Date();
            const page = document.getElementById('calendarPage');
            page.classList.add('flipping-next');
            
            setTimeout(() => {
                updateCalendar();
            }, 400);
            
            setTimeout(() => {
                page.classList.remove('flipping-next');
            }, 800);
        }

        // Date Picker Functions
        function openDatePicker() {
            selectedYear = currentDate.getFullYear();
            selectedMonth = currentDate.getMonth();
            selectedDay = currentDate.getDate();
            
            populatePicker();
            document.getElementById('datePickerModal').classList.remove('hidden');
        }

        function closeDatePicker() {
            document.getElementById('datePickerModal').classList.add('hidden');
        }

        function populatePicker() {
            // Years (2020-2030)
            const yearList = document.getElementById('yearList');
            yearList.innerHTML = '';
            for (let y = 2020; y <= 2030; y++) {
                const div = document.createElement('div');
                div.className = `picker-item p-3 text-center text-white ${y === selectedYear ? 'selected' : ''}`;
                div.textContent = y + '年';
                div.onclick = () => { selectedYear = y; populatePicker(); };
                yearList.appendChild(div);
            }
            
            // Months
            const monthList = document.getElementById('monthList');
            monthList.innerHTML = '';
            for (let m = 0; m < 12; m++) {
                const div = document.createElement('div');
                div.className = `picker-item p-3 text-center text-white ${m === selectedMonth ? 'selected' : ''}`;
                div.textContent = (m + 1) + '月';
                div.onclick = () => { selectedMonth = m; populatePicker(); };
                monthList.appendChild(div);
            }
            
            // Days
            const daysInMonth = new Date(selectedYear, selectedMonth + 1, 0).getDate();
            const dayList = document.getElementById('dayList');
            dayList.innerHTML = '';
            for (let d = 1; d <= daysInMonth; d++) {
                const div = document.createElement('div');
                div.className = `picker-item p-3 text-center text-white ${d === selectedDay ? 'selected' : ''}`;
                div.textContent = d + '日';
                div.onclick = () => { selectedDay = d; populatePicker(); };
                dayList.appendChild(div);
            }
            
            // Scroll to selected
            setTimeout(() => {
                yearList.children[selectedYear - 2020]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                monthList.children[selectedMonth]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                dayList.children[selectedDay - 1]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        function confirmDateSelection() {
            currentDate = new Date(selectedYear, selectedMonth, selectedDay);
            closeDatePicker();
            
            const page = document.getElementById('calendarPage');
            page.classList.add('flipping-next');
            
            setTimeout(() => {
                updateCalendar();
            }, 400);
            
            setTimeout(() => {
                page.classList.remove('flipping-next');
            }, 800);
        }

        // Initialize
        updateCalendar();

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeDate(-1);
            if (e.key === 'ArrowRight') changeDate(1);
            if (e.key === 'Escape') closeDatePicker();
        });

        // Touch/swipe support
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            if (touchEndX < touchStartX - 50) changeDate(1);
            if (touchEndX > touchStartX + 50) changeDate(-1);
        }
    </script>
</body>
</html>
